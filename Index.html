      h += '<th style="min-width:120px;">Commentaire</th>';
      h += '<th style="min-width:110px;">Date révision</th>';
      h += '<th style="min-width:360px;">Suivi sport</th>';
      h += '</tr></thead><tbody>';

      for (var i = 0; i < list.length; i++) {
        var x = list[i];
        var a = x.agent;
        var searchStr = (a.nomPrenom + ' ' + a.centrePrincipal + ' ' + (a.centreSecondaire || '')).toLowerCase();

        h += '<tr class="sport-row" data-search="' + esc(searchStr) + '">';
        h += '<td class="row-num">' + (i + 1) + '</td>';

        /* Archive checkbox */
        h += '<td class="no-print" style="text-align:center;"><input type="checkbox" class="archive-cb" onchange="archiveFromSport(event,\'' + esc(a.matricule) + '\',\'' + esc(a.nomPrenom).replace(/'/g, '\\x27') + '\')" title="Archiver"></td>';

        var meta = getSportFollowMeta(a.matricule);
        var docs = meta.documents || [];

        h += '<td><strong>' + esc(a.nomPrenom) + '</strong>';
        if (docs.length > 0) {
          h += '<span class="doc-count-badge" onmouseenter="showSportDocsTip(event,\'' + esc(a.matricule) + '\')" onmouseleave="hideTip()">📎 ' + docs.length + '</span>';
        }
        h += '</td>';
        h += '<td>' + esc(a.centrePrincipal || '') + '</td>';

        /* Date dernier ICP */
        var latestIcp = null;
        for (var li = 0; li < SPORT_TESTS_META.length; li++) {
          var le = x.byTest[SPORT_TESTS_META[li].key];
          if (le && le.dateRaw && (!latestIcp || le.dateRaw > latestIcp)) latestIcp = le.dateRaw;
        }
        if (latestIcp) {
          var icpOld = latestIcp < oneYearAgo;
          var dIcp = new Date(latestIcp);
          var icpStr = ('0' + dIcp.getDate()).slice(-2) + '/' + ('0' + (dIcp.getMonth() + 1)).slice(-2) + '/' + dIcp.getFullYear();
          h += '<td class="sport-cell' + (icpOld ? ' sport-cell-old' : '') + '" style="white-space:nowrap;">' + icpStr + '</td>';
        } else {
          h += '<td class="sport-cell sport-cell-old">—</td>';
        }

        /* Test columns */
        for (var ti2 = 0; ti2 < SPORT_TESTS_META.length; ti2++) {
          var t = SPORT_TESTS_META[ti2];
          var entry = x.byTest[t.key];
          if (entry) {
            var isOld = !entry.dateRaw || entry.dateRaw < oneYearAgo;
            h += '<td class="sport-cell' + (isOld ? ' sport-cell-old' : '') + '" onmouseenter="showSportTestTip(event,\'' + esc(a.matricule) + '\',\'' + esc(t.key).replace(/'/g, '\\x27') + '\')" onmouseleave="hideTip()" style="cursor:help;">';
            h += '<strong>' + esc(entry.resultat) + '</strong>';
            h += '<div style="font-size:0.72em;color:var(--text-light);margin-top:2px;">' + esc(entry.date) + '</div>';
            h += '</td>';
          } else {
            h += '<td class="sport-cell sport-cell-empty">\u2014</td>';
          }
        }

        /* Comment + Revision fields */
        var commentVal = sportComments[a.matricule] || '';
        var revisionVal = sportRevisions[a.matricule] || '';
        h += '<td class="no-print"><input type="text" class="sport-input-sm" value="' + esc(commentVal) + '" placeholder="Commentaire…" onchange="saveSportComment(\'' + esc(a.matricule) + '\',this.value)"></td>';
        h += '<td class="no-print"><input type="date" class="sport-input-sm" value="' + esc(revisionVal) + '" onchange="saveSportRevision(\'' + esc(a.matricule) + '\',this.value)"></td>';
        h += '<td class="no-print sport-meta-cell">';
        h += '<div class="sport-meta-grid">';
        h += '<span class="sport-meta-inline"><span class="sport-meta-label">Suivi</span><input type="checkbox" class="archive-cb" ' + (meta.suiviEnPlace ? 'checked' : '') + ' onchange="saveSportFollowUpAction(\'' + esc(a.matricule) + '\',this.checked,null,null)"></span>';
        h += '<input type="text" class="sport-input-sm" value="' + esc(meta.nomEap || '') + '" placeholder="Nom EAP…" onchange="saveSportFollowUpAction(\'' + esc(a.matricule) + '\',null,this.value,null)">';

        if (meta.suiviEnPlace) {
          h += '<select class="sport-input-sm" onchange="saveSportFollowUpAction(\'' + esc(a.matricule) + '\',null,null,this.value)">';
          h += renderProgramOptions(meta.programmeKey || '');
          h += '</select>';

          var p = sportProgramCatalog[meta.programmeKey || ''];
          if (p) {
            h += '<span style="flex-basis:100%;"></span>';
            h += '<span class="see-program-link" onclick="openProgramPdf(\'' + esc(meta.programmeKey) + '\')">Voir le programme</span>';
          }

          var hasSessions = meta.sessions && meta.sessions.length > 0;
          if (hasSessions) h += '<span class="sport-session-icon" onmouseenter="showSportSessionsTip(event,\'' + esc(a.matricule) + '\')" onmouseleave="hideTip()">📅</span>';

          if (meta.programmeKey) {
            h += '<button class="btn btn-info-outline" onclick="sendSportFollowLink(\'' + esc(a.matricule) + '\')">🔗 Envoyer lien suivi</button>';
          }
        }

        h += '<button class="btn btn-outline" onclick="triggerAddSportDocument(\'' + esc(a.matricule) + '\')">Ajouter document</button>';
        h += '</div>';
        h += '</td>';

        h += '</tr>';
      }

      h += '</tbody></table></div>';
      document.getElementById('app').innerHTML = h;
      cleanupFixedHeaders();
      setupFixedHeader('sportTable');
    }

    function getSportFollowMeta(matricule) {
      var m = sportMetaByMatricule[matricule] || {};
      return {
        suiviEnPlace: !!m.suiviEnPlace,
        nomEap: m.nomEap || '',
        programmeKey: m.programmeKey || '',
        sessions: Array.isArray(m.sessions) ? m.sessions : [],
        documents: Array.isArray(m.documents) ? m.documents : [],
        followToken: m.followToken || '',
        followLink: m.followLink || ''
      };
    }

    function renderProgramOptions(selectedKey) {
      var keys = Object.keys(sportProgramCatalog || {});
      var h = '<option value="">— Choisir un programme —</option>';
      for (var i = 0; i < keys.length; i++) {
        var k = keys[i];
        var p = sportProgramCatalog[k];
        h += '<option value="' + esc(k) + '"' + (selectedKey === k ? ' selected' : '') + '>' + esc(p.label) + '</option>';
      }
      return h;
    }

    function saveSportFollowUpAction(matricule, suiviVal, eapVal, programVal) {
      var meta = getSportFollowMeta(matricule);
      var suivi = (suiviVal === null || suiviVal === undefined) ? meta.suiviEnPlace : !!suiviVal;
      var eap = (eapVal === null || eapVal === undefined) ? meta.nomEap : (eapVal || '');
      var programKey = (programVal === null || programVal === undefined) ? meta.programmeKey : (programVal || '');

      if (!suivi) programKey = '';

      if (!sportMetaByMatricule[matricule]) sportMetaByMatricule[matricule] = { documents: [], sessions: [] };
      sportMetaByMatricule[matricule].suiviEnPlace = suivi;
      sportMetaByMatricule[matricule].nomEap = eap;
      sportMetaByMatricule[matricule].programmeKey = programKey;
      if (programKey && (!sportMetaByMatricule[matricule].sessions || sportMetaByMatricule[matricule].sessions.length === 0)) {
        sportMetaByMatricule[matricule].sessions = buildDemoSessionsClient(programKey);
      }

      google.script.run.withFailureHandler(function (err) {
        alert('Erreur : ' + (err.message || err));
      }).saveSportFollowUp(matricule, suivi, eap, programKey);

      renderSportPage();
    }

    function buildDemoSessionsClient(programKey) {
      var now = new Date().getTime();
      var d1 = new Date(now - 12 * 24 * 3600000).toLocaleDateString('fr-FR');
      var d2 = new Date(now - 7 * 24 * 3600000).toLocaleDateString('fr-FR');
      var d3 = new Date(now - 2 * 24 * 3600000).toLocaleDateString('fr-FR');
      var byP = {
        perte_poids: ['Cardio 40 min', 'Circuit renfo léger', 'Récup active + mobilité'],
        reathletisation: ['Mobilité globale', 'Atelier unilatéral', 'Intervalle progressif'],
        reprise_genou: ['Proprioception genou', 'Course progressive', 'Renfo quadriceps/ischios'],
        reprise_accouchement: ['Marche active', 'Gainage doux', 'Renfo global léger'],
        prevention_epaule: ['Élastiques coiffe', 'Stabilité scapulaire', 'Travail overhead progressif'],
        prevention_cheville: ['Équilibre unipodal', 'Sauts latéraux', 'Course terrain plat']
      };
      var c = byP[programKey] || ['Séance 1', 'Séance 2', 'Séance 3'];
      return [
        { date: d1, commentaire: c[0] },
        { date: d2, commentaire: c[1] },
        { date: d3, commentaire: c[2] }
      ];
    }

    function openProgramPdf(programKey) {
      var p = sportProgramCatalog[programKey];
      if (!p) {
        alert('Programme introuvable.');
        return;
      }
      document.getElementById('programModalTitle').textContent = '📘 ' + p.label;
      document.getElementById('programModalFrame').src = p.previewUrl;
      document.getElementById('programModal').style.display = 'flex';
    }

    function sendSportFollowLink(matricule) {
      google.script.run.withSuccessHandler(function (res) {
        if (!sportMetaByMatricule[matricule]) sportMetaByMatricule[matricule] = { documents: [], sessions: [] };
        sportMetaByMatricule[matricule].followToken = res.token || '';
        sportMetaByMatricule[matricule].followLink = res.url || '';
        var link = res.url || '';
        if (!link) {
          alert('Lien indisponible.');
          return;
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(link).then(function () {
            alert('Lien copié ✅\n\n' + link);
          }).catch(function () {
            prompt('Copiez ce lien de suivi :', link);
          });
        } else {
          prompt('Copiez ce lien de suivi :', link);
        }
      }).withFailureHandler(function (err) {
        alert('Erreur : ' + (err.message || err));
      }).getOrCreateSportFollowLink(matricule);
    }

    function renderSportSessionMonth(monthDate, sessionsByDay, today) {
      var y = monthDate.getFullYear();
      var m = monthDate.getMonth();
      var first = new Date(y, m, 1);
      var firstDow = (first.getDay() + 6) % 7; // lundi=0
      var daysInMonth = new Date(y, m + 1, 0).getDate();
      var labels = ['L', 'M', 'M', 'J', 'V', 'S', 'D'];

      var h = '<div class="sport-month-card">';
      h += '<div class="sport-month-title">' + monthDate.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' }) + '</div>';
      h += '<div class="sport-month-grid">';
      for (var li = 0; li < labels.length; li++) h += '<div class="sport-day-head">' + labels[li] + '</div>';
      for (var e = 0; e < firstDow; e++) h += '<div class="sport-day-cell empty"></div>';
      for (var d = 1; d <= daysInMonth; d++) {
        var iso = y + '-' + ('0' + (m + 1)).slice(-2) + '-' + ('0' + d).slice(-2);
        var has = !!sessionsByDay[iso];
        var isToday = today.getFullYear() === y && today.getMonth() === m && today.getDate() === d;
        var cls = 'sport-day-cell' + (has ? ' has-session' : '') + (isToday ? ' today' : '');
        var title = '';
        if (has) {
          var items = sessionsByDay[iso].map(function (s) { return (s.commentaire || '').trim(); }).filter(Boolean);
          title = items.length ? ' title="' + esc(items.join(' | ')) + '"' : '';
        }
        h += '<div class="' + cls + '"' + title + '>' + d + '</div>';
      }
      h += '</div></div>';
      return h;
    }

    function showSportSessionsTip(event, matricule) {
      var meta = getSportFollowMeta(matricule);
      var sessions = meta.sessions || [];
      if (sessions.length === 0) return;
      var agent = agentsByMatricule[matricule];
      var today = new Date();
      var curMonth = new Date(today.getFullYear(), today.getMonth(), 1);
      var prevMonth = new Date(today.getFullYear(), today.getMonth() - 1, 1);
      var sessionsByDay = {};

      for (var i = 0; i < sessions.length; i++) {
        var dObj = parseSessionDateToObj(sessions[i]);
        if (!dObj) continue;
        var iso = dObj.getFullYear() + '-' + ('0' + (dObj.getMonth() + 1)).slice(-2) + '-' + ('0' + dObj.getDate()).slice(-2);
        if (!sessionsByDay[iso]) sessionsByDay[iso] = [];
        sessionsByDay[iso].push(sessions[i]);
      }

      var ordered = sessions.slice().sort(function (a, b) {
        var ad = parseSessionDateToObj(a);
        var bd = parseSessionDateToObj(b);
        if (!ad && !bd) return 0;
        if (!ad) return 1;
        if (!bd) return -1;
        return bd.getTime() - ad.getTime();
      });

      var h = '<div style="font-weight:700;margin-bottom:8px;">📅 Planning des séances</div>';
      if (agent) h += '<div style="margin-bottom:8px;font-weight:600;">' + esc(agent.nomPrenom) + '</div>';
      h += '<div class="sport-calendar-tip-months">';
      h += renderSportSessionMonth(prevMonth, sessionsByDay, today);
      h += renderSportSessionMonth(curMonth, sessionsByDay, today);
      h += '</div>';
      h += '<div style="margin-top:8px;font-weight:700;">Dernières séances</div>';
      for (var j = 0; j < ordered.length && j < 6; j++) {
        var dd = parseSessionDateToObj(ordered[j]);
        h += '<div class="sport-entry"><strong>' + esc(ordered[j].date || formatDateFrFromObj(dd)) + '</strong> — ' + esc(ordered[j].commentaire || '') + '</div>';
      }
      positionTooltip(event, h);
    }

    function triggerAddSportDocument(matricule) {
      pendingSportDocMatricule = matricule;
      var input = document.getElementById('sportDocInput');
      if (!input) return;
      input.value = '';
      input.click();
    }

    function handleSportDocFileSelected(event) {
      var file = event.target.files && event.target.files[0];
      if (!file || !pendingSportDocMatricule) return;

      var validTypes = [
        'application/pdf',
        'application/msword',
        'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
        'application/vnd.oasis.opendocument.text'
      ];
      var nameLower = (file.name || '').toLowerCase();
      var extOk = /\.(pdf|doc|docx|odt)$/.test(nameLower);
      if (validTypes.indexOf(file.type) === -1 && !extOk) {
        alert('Seuls les fichiers PDF/Word sont autorisés.');
        return;
      }

      var reader = new FileReader();
      var matricule = pendingSportDocMatricule;
      pendingSportDocMatricule = '';

      reader.onload = function (e) {
        var result = e.target.result || '';
        var base64 = result.split(',')[1] || '';
        if (!base64) {
          alert('Impossible de lire le fichier sélectionné.');
          return;
        }

        google.script.run.withSuccessHandler(function (res) {
          if (!sportMetaByMatricule[matricule]) sportMetaByMatricule[matricule] = { suiviEnPlace: false, nomEap: '', documents: [] };
          if (!Array.isArray(sportMetaByMatricule[matricule].documents)) sportMetaByMatricule[matricule].documents = [];
          sportMetaByMatricule[matricule].documents.push(res.document);
          renderSportPage();
        }).withFailureHandler(function (err) {
          alert('Erreur upload : ' + (err.message || err));
        }).uploadSportDocument(matricule, file.name, file.type, base64);
      };

      reader.readAsDataURL(file);
    }

    function showSportDocsTip(event, matricule) {
      clearTimeout(_tipHideTimer);
      var meta = getSportFollowMeta(matricule);
      var docs = meta.documents || [];
      if (docs.length === 0) return;

      _tipIsSticky = true;
      var agent = agentsByMatricule[matricule];
      var h = '<div style="font-weight:700;margin-bottom:8px;">📎 Documents de suivi sport (' + docs.length + ')</div>';
      if (agent) h += '<div style="margin-bottom:6px;font-weight:600;">' + esc(agent.nomPrenom) + '</div>';

      for (var i = 0; i < docs.length; i++) {
        var d = docs[i];
        h += '<div class="sport-doc-row">';
        h += '<a class="sport-doc-link" href="' + esc(d.url || '#') + '" target="_blank" rel="noopener" style="flex:1;min-width:0;">📄 ' + esc(d.name || ('Document ' + (i + 1))) + '</a>';
        h += '<button class="doc-delete-btn" title="Supprimer" onclick="deleteSportDocument(\'' + esc(matricule) + '\',\'' + esc(d.id || '') + '\',\'' + esc(d.name || '').replace(/'/g, '\\x27') + '\')">✕</button>';
        h += '</div>';
      }

      positionTooltip(event, h);
    }

    function deleteSportDocument(matricule, fileId, fileName) {
      if (!confirm('Supprimer le document "' + fileName + '" ?')) return;
      hideTipNow();
      google.script.run.withSuccessHandler(function () {
        var m = sportMetaByMatricule[matricule];
        if (m && Array.isArray(m.documents)) {
          m.documents = m.documents.filter(function (d) { return d.id !== fileId; });
        }
        renderSportPage();
      }).withFailureHandler(function (err) {
        alert('Erreur suppression : ' + (err.message || err));
      }).deleteSportDocument(matricule, fileId);
    }

    /* ═══════════════════════════════════════════════
       SPORT FILTER PANEL
       ═══════════════════════════════════════════════ */
    function renderFilterPanel() {
      var h = '<div class="filter-panel">';
      h += '<div style="font-weight:700;font-size:1.05em;margin-bottom:14px;">📊 Filtres personnalisés — Critères OU</div>';

      if (sportFilterMaxRules.length === 0) {
        h += '<p style="color:var(--text-light);margin-bottom:12px;">Aucun critère défini. Ajoutez un critère pour filtrer les résultats.</p>';
      }

      for (var i = 0; i < sportFilterMaxRules.length; i++) {
        var r = sportFilterMaxRules[i];
        if (i > 0) h += '<div style="text-align:center;color:var(--blue);font-weight:700;margin:8px 0;font-size:0.9em;">OU</div>';

        h += '<div class="filter-rule-row">';

        /* Test selector */
        h += '<select onchange="updateFilterRule(' + i + ',\'test\',this.value)" style="min-width:180px;">';
        for (var j = 0; j < SPORT_TESTS_META.length; j++) {
          var tm = SPORT_TESTS_META[j];
          h += '<option value="' + esc(tm.key) + '"' + (r.test === tm.key ? ' selected' : '') + '>' + esc(tm.label) + '</option>';
        }
        h += '</select>';

        /* Operator */
        h += '<select onchange="updateFilterRule(' + i + ',\'op\',this.value)" style="width:65px;">';
        var ops = ['<', '>', '<=', '>=', '='];
        for (var k = 0; k < ops.length; k++) {
          h += '<option value="' + ops[k] + '"' + (r.op === ops[k] ? ' selected' : '') + '>' + esc(ops[k]) + '</option>';
        }
        h += '</select>';

        /* Value */
        h += '<input type="number" step="any" value="' + (r.value !== undefined && r.value !== '' ? r.value : '') + '" oninput="updateFilterRule(' + i + ',\'value\',this.value)" placeholder="Valeur" style="width:100px;">';

        /* Remove */
        h += '<button onclick="removeFilterRule(' + i + ')" style="background:none;border:1.5px solid var(--primary);color:var(--primary);border-radius:6px;padding:5px 10px;cursor:pointer;font-size:0.85em;font-weight:600;transition:all .2s;">✕</button>';
        h += '</div>';
      }

      h += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;">';
      h += '<button onclick="addFilterRule()" class="btn btn-outline" style="font-size:0.85em;">+ Ajouter un critère OU</button>';
      h += '<button onclick="applyMaxFilter()" class="btn btn-primary" style="font-size:0.85em;">✅ Appliquer</button>';
      h += '<button onclick="saveFilterRules()" class="btn btn-green-outline" style="font-size:0.85em;">💾 Enregistrer</button>';
      h += '<button onclick="resetFilterRules()" class="btn btn-outline" style="font-size:0.85em;">🔄 Réinitialiser</button>';
      h += '</div></div>';
      return h;
    }

    function addFilterRule() {
      sportFilterMaxRules.push({ test: SPORT_TESTS_META[0].key, op: '<', value: '' });
      renderSportPage();
    }

    function removeFilterRule(idx) {
      sportFilterMaxRules.splice(idx, 1);
      renderSportPage();
    }

    function updateFilterRule(idx, field, value) {
      if (sportFilterMaxRules[idx]) sportFilterMaxRules[idx][field] = value;
    }

    function applyMaxFilter() {
      sportFilterMaxActive = true;
      renderSportPage();
    }

    function clearMaxFilter() {
      sportFilterMaxActive = false;
      sportFilterMaxRules = [];
      renderSportPage();
    }

    function saveFilterRules() {
      try {
        localStorage.setItem('sdis66_sport_filter_rules', JSON.stringify(sportFilterMaxRules));
        savedSportFilterRules = JSON.parse(JSON.stringify(sportFilterMaxRules));
        alert('✅ Critères enregistrés ! Ils seront pré-chargés au prochain clic sur « Filtre max ».');
      } catch (e) {
        alert('Erreur lors de l\x27enregistrement.');
      }
    }

    function loadSavedFilterRules() {
      try {
        var s = localStorage.getItem('sdis66_sport_filter_rules');
        if (s) savedSportFilterRules = JSON.parse(s);
      } catch (e) { /* ignore */ }
    }

    function resetFilterRules() {
      sportFilterMaxActive = false;
      sportFilterMaxRules = [];
      sportFilterPanelOpen = false;
      renderSportPage();
    }

    function toggleIcpFilter() {
      sportFilterICP = !sportFilterICP;
      renderSportPage();
    }

    function toggleMaxFilterPanel() {
      if (!sportFilterPanelOpen) {

    /* ═══════════════════════════════════════════════
       DTP MILESTONE LOGIC
       ═══════════════════════════════════════════════ */
    function getDtpMilestoneStatus(matricule) {
      var agent = agentsByMatricule[matricule];
      if (!agent || !agent.birthYear) return { '25': false, '45': false, '65': false };
      var vac = vaccinsByMatricule[matricule];
      var dtpEntries = vac ? vac.dtp : [];
      var manual = dtpChecks[matricule] || {};
      var result = {};
      var milestones = [25, 45, 65];

      /* 1ère passe : vérifier chaque jalon individuellement */
      for (var i = 0; i < milestones.length; i++) {
        var m = milestones[i];
        var key = '' + m;
        if (manual[key] !== undefined) {
          result[key] = manual[key];
        } else {
          var auto = false;
          for (var j = 0; j < dtpEntries.length; j++) {
            var e = dtpEntries[j];
            if (e.dateRaw && agent.birthYear) {
              var vacYear = new Date(e.dateRaw).getFullYear();
              var ageAtVac = vacYear - agent.birthYear;
              if (ageAtVac >= m - 5 && ageAtVac <= m + 5) { auto = true; break; }
            }
          }
          result[key] = auto;
        }
      }

      /* 2ème passe : la dernière dose couvre tous les jalons précédents.
         Ex: dose à 45 ans → jalons 25 ET 45 sont OK, seul 65 reste à faire */
      for (var i = milestones.length - 1; i >= 0; i--) {
        if (result['' + milestones[i]]) {
          for (var k = 0; k < i; k++) {
            if (manual['' + milestones[k]] === undefined) {
              result['' + milestones[k]] = true;
            }
          }
          break;
        }
      }

      return result;
    }

    function computeDtpStatus(matricule) {
      var agent = agentsByMatricule[matricule];
      if (!agent || !agent.age) return 'neutral';
      var checks = getDtpMilestoneStatus(matricule);
      var milestones = [25, 45, 65];
      var anyOverdue = false;
      var hasRelevant = false;
      var allRelevantOk = true;
      for (var i = 0; i < milestones.length; i++) {
        var m = milestones[i];
        if (agent.age >= m) {
          hasRelevant = true;
          if (!checks['' + m]) {
            allRelevantOk = false;
            if (agent.age > m + 5) anyOverdue = true;
          }
        }
      }
      if (anyOverdue) return 'warn';
      if (hasRelevant && allRelevantOk) return 'ok';
      return 'neutral';
    }

    function isDtpEnRetard(matricule) {
      var agent = agentsByMatricule[matricule];
      if (!agent || !agent.age) return false;
      var checks = getDtpMilestoneStatus(matricule);
      var milestones = [25, 45, 65];
      for (var i = 0; i < milestones.length; i++) {
        if (agent.age > milestones[i] + 5 && !checks['' + milestones[i]]) return true;
      }
      return false;
    }

    function isDtpAFaire(matricule) {
      var agent = agentsByMatricule[matricule];
      if (!agent || !agent.age) return false;
      var checks = getDtpMilestoneStatus(matricule);
      var milestones = [25, 45, 65];
      for (var i = 0; i < milestones.length; i++) {
        var m = milestones[i];
        if (!checks['' + m] && agent.age >= m - 1 && agent.age <= m + 5) return true;
      }
      return false;
    }

    function toggleDtpCheck(matricule, milestone, checked) {
      if (!dtpChecks[matricule]) dtpChecks[matricule] = {};
      dtpChecks[matricule]['' + milestone] = checked;
      saveDtpChecks();
      /* Re-render badge on main page if visible */
      if (!vaccinViewActive && !sportViewActive) renderMainPage();
      else if (vaccinViewActive) renderVaccinPage();
    }

    function renderVaccinHBPage() {
      var now = Date.now();

      var list = allAgents.map(function (a) {

        });

        var status = 'inconnu';
        if (vac.immunise) status = 'immunise';
        else if (vac.nonRepondeur) status = 'nonRepondeur';

        /* Last vaccination HB date */
        var lastVacDate = 0;
        for (var i = 0; i < vac.hb.length; i++) {
          if (vac.hb[i].dateRaw && vac.hb[i].dateRaw > lastVacDate) lastVacDate = vac.hb[i].dateRaw;
        }

        }

    /* ═══════════════════════════════════════════════
       FIXED TABLE HEADERS (JS clone – works with overflow-x)
       ═══════════════════════════════════════════════ */
    var _fhItems = [];

    function cleanupFixedHeaders() {
      for (var i = 0; i < _fhItems.length; i++) {
        var fh = _fhItems[i];
        window.removeEventListener('scroll', fh.fn, true);
        window.removeEventListener('resize', fh.fn);
        if (fh.wrap) fh.wrap.removeEventListener('scroll', fh.fn);
        if (fh.el && fh.el.parentNode) fh.el.parentNode.removeChild(fh.el);
      }
      _fhItems = [];
    }

    function setupFixedHeader(tableId) {
      var table = document.getElementById(tableId);
      if (!table) return;
      var thead = table.querySelector('thead');
      if (!thead) return;
      var wrap = table.closest('.table-wrap');
      if (!wrap) return;
      var hdr = document.querySelector('.header');
      var topPx = hdr ? hdr.offsetHeight : 58;

      var box = document.createElement('div');
      box.className = 'fixed-thead-clone';
      var ct = document.createElement('table');
      var cth = thead.cloneNode(true);
      ct.appendChild(cth);
      box.appendChild(ct);
      document.body.appendChild(box);

      function update() {
        if (!table.offsetParent) { box.style.display = 'none'; return; }
        var thR = thead.getBoundingClientRect();
        var wR = wrap.getBoundingClientRect();
        var tblBot = table.getBoundingClientRect().bottom;
        var show = thR.bottom <= topPx && tblBot > topPx + thR.height;
        if (!show) { box.style.display = 'none'; return; }
        var origThs = thead.querySelectorAll('th');
        var clonThs = cth.querySelectorAll('th');
        var tw = 0;
        for (var i = 0; i < origThs.length && i < clonThs.length; i++) {
          var w = origThs[i].getBoundingClientRect().width;
          clonThs[i].style.width = w + 'px';
          clonThs[i].style.minWidth = w + 'px';
          tw += w;
        }
        ct.style.width = tw + 'px';
        ct.style.marginLeft = (-wrap.scrollLeft) + 'px';
        box.style.top = topPx + 'px';
        box.style.left = wR.left + 'px';
        box.style.width = wR.width + 'px';
        box.style.display = 'block';
      }

      window.addEventListener('scroll', update, true);
      window.addEventListener('resize', update);
      wrap.addEventListener('scroll', update);
      _fhItems.push({ el: box, wrap: wrap, fn: update });
      setTimeout(update, 60);
    }

      var agents = getBruleurAgents();

      /* Sort */
      var ss = sortStates.bruleur;
      if (ss && ss.key) {
        var kf = {
          nomPrenom: function (a) { return a.nomPrenom || ''; },
          centre: function (a) { return a.centrePrincipal || ''; },
          specialite: function (a) { return (a.specialites || []).join(', '); }
        };
        if (kf[ss.key]) agents = doSort(agents, kf[ss.key], ss.dir);
      }

      var nbExpo = 0;
      agents.forEach(function (a) {
        var bd = bruleurDataByMatricule[a.matricule];
        if (bd && bd.exposition) nbExpo++;
      });

      /* Apply expo filter */
      var totalAgents = agents.length;
      if (bruleurExpoFilter) {
        agents = agents.filter(function (a) {
          var bd = bruleurDataByMatricule[a.matricule];
          return bd && bd.exposition;
        });
      }

      var h = '';
      h += '<div class="sticky-subheader no-print">';
      h += '<div class="page-header">';
      h += '<div>';
      h += '<div class="page-title">🔥 Suivi spécialité Brûleur / Caisson</div>';
      h += '<div class="page-subtitle">' + (bruleurExpoFilter ? agents.length + ' agent(s) filtrés (expo &gt; 20 ans)' : totalAgents + ' agent(s) — ' + nbExpo + ' avec exposition &gt; 20 ans') + '</div>';
      h += '</div>';
      h += '<div class="no-print" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">';
      h += '<button onclick="toggleBruleurExpoFilter()" class="btn ' + (bruleurExpoFilter ? 'btn-primary' : 'btn-outline') + '" style="font-size:0.85em;">🔥 Expo &gt; 20 ans uniquement</button>';
      h += '<button onclick="backToMainFromBruleur()" class="btn btn-outline">← Retour</button>';
      h += '</div></div>';

      /* Legend */
      h += '<div style="background:var(--card-bg);border-radius:var(--radius);padding:14px 20px;margin-bottom:14px;box-shadow:var(--shadow);font-size:0.9em;line-height:1.8;">';
      h += '<div style="font-weight:700;font-size:1.05em;margin-bottom:6px;">📖 Légende</div>';
      h += '<div><strong>Exposition &gt; 20 ans :</strong> Active le suivi spécifique incendie (ECBU tous les 6 mois + scanner thoracique basse dose)</div>';
      h += '<div><strong>Scanner :</strong> 🩻 — ';
      h += '<span class="bc-icon bc-prescrit" style="width:20px;height:20px;font-size:11px;cursor:default;">🩻</span> Prescrit &nbsp; ';
      h += '<span class="bc-icon bc-recu" style="width:20px;height:20px;font-size:11px;cursor:default;">🩻</span> Reçu &nbsp; ';
      h += '<span class="bc-icon bc-vu" style="width:20px;height:20px;font-size:11px;cursor:default;">🩻</span> Vu par le médecin</div>';
      h += '<div><strong>Consentement :</strong> ✍️ — ';
      h += '<span class="bc-icon bc-prescrit" style="width:20px;height:20px;font-size:11px;cursor:default;">✍️</span> Envoyé &nbsp; ';
      h += '<span class="bc-icon bc-vu" style="width:20px;height:20px;font-size:11px;cursor:default;">✍️</span> Reçu</div>';
      h += '<div><strong>ECBU :</strong> 🧪 — mêmes statuts. <span style="color:#e74c3c;font-weight:600;">● Rouge clignotant</span> = en retard (&gt; 6 mois depuis dernier vu)</div>';
      h += '</div>';

      h += '<div class="sticky-search-row"><input type="text" class="search-box" id="bruleurSearch" placeholder="Rechercher un agent…" oninput="filterBruleurTable()"></div>';
      h += '</div>';

      h += '<div class="table-wrap" id="bruleurTableContainer"><table id="bruleurTable"><thead><tr>';
      h += '<th style="width:40px">#</th>';
      h += '<th style="width:40px" class="no-print"></th>';
      h += thSort('bruleur', 'nomPrenom', 'NOM Prénom');
      h += thSort('bruleur', 'centre', 'Centre');
      h += thSort('bruleur', 'specialite', 'Spécialité');
      h += '<th style="width:120px;text-align:center;">Expo &gt; 20 ans</th>';
      h += '<th style="width:100px;text-align:center;">Consentement</th>';
      h += '<th style="width:90px;text-align:center;">Scanner</th>';
      h += '<th style="min-width:250px;">ECBU (tous les 6 mois)</th>';
      h += '<th style="min-width:140px;" class="no-print">Commentaire</th>';
      h += '</tr></thead><tbody>';

      for (var i = 0; i < agents.length; i++) {
        h += renderBruleurRow(agents[i], i);
      }

      h += '</tbody></table></div>';
      document.getElementById('app').innerHTML = h;
      cleanupFixedHeaders();
      setupFixedHeader('bruleurTable');
    }

    function renderBruleurRow(a, idx) {
      var sm = esc(a.matricule);
      var bd = bruleurDataByMatricule[a.matricule] || { exposition: false, scanner: { statut: '', date: '' }, consentement: '', ecbus: [] };
      var now = Date.now();
      var speList = (a.specialites || []).filter(function (s) { return s === 'Bruleur' || s === 'caisson'; });
      var searchStr = (a.nomPrenom + ' ' + a.centrePrincipal).toLowerCase();

      var agentExams = (examensByMatricule[a.matricule] || []).filter(function (e) { return isExamVisibleForFilter(e); });

      var h = '<tr class="agent-row" data-search="' + esc(searchStr) + '">';
      h += '<td>' + (idx + 1) + '</td>';

      /* Add exam button */
      h += '<td class="add-exam-cell no-print"><span class="add-exam-wrap">';
      h += '<button class="add-exam-btn" onclick="toggleAddMenu(event,\'' + sm + '\')" title="Ajouter un examen">📄<sup style="font-size:9px;color:var(--green)">+</sup></button>';
      h += '<div class="add-exam-dropdown" id="addmenu-' + sm + '">';
      h += '<button onclick="event.stopPropagation();openAddExam(\'' + sm + '\',\'biologie\')">🧪</button>';
      h += '<button onclick="event.stopPropagation();openAddExam(\'' + sm + '\',\'automesure\')">🩻</button>';
      h += '<button onclick="event.stopPropagation();openAddExam(\'' + sm + '\',\'imagerie\')">☢️</button>';
      h += '<button onclick="event.stopPropagation();openAddExam(\'' + sm + '\',\'avis_specialise\')">🩺</button>';
      h += '<button onclick="event.stopPropagation();openAddExam(\'' + sm + '\',\'autre\')">🅰️</button>';
      h += '</div></span></td>';

      h += '<td><strong>' + esc(a.nomPrenom) + '</strong>';
      if (agentExams.length > 0) {
        h += '<span class="exam-icons">';
        for (var j = 0; j < agentExams.length; j++) {
          var ex = agentExams[j];
          var isExOverdue = ex.dateResultatRaw && ex.dateResultatRaw < now;
          var cc = isExOverdue ? 'red' : 'green';
          var icons = { biologie: '🧪', automesure: '🩻', imagerie: '☢️', avis_specialise: '🩺', autre: '🅰️' };
          h += '<span class="exam-icon-wrap"><span class="exam-badge ' + cc + '" onclick="toggleExamPopover(event,\'' + esc(ex.id) + '\')">' + (icons[ex.type] || '📋') + '</span></span>';
        }
        h += '</span>';
      }
      /* Alert icon for exams à prescrire (bruleur view) */
      var alertExamsB = getAgentExamsAPrescrire(a.matricule);
      if (alertExamsB.length > 0) {
        h += '<span class="alert-prescrire" onclick="showPrescrireForAgent(event,\'' + sm + '\')" title="' + alertExamsB.length + ' examen(s) à prescrire">🚨</span>';
      }
      h += '</td>';
      h += '<td>' + esc(a.centrePrincipal) + '</td>';
      h += '<td>' + esc(speList.join(', ')) + '</td>';

      /* Checkbox exposition > 20 ans */
      h += '<td style="text-align:center;"><input type="checkbox"' + (bd.exposition ? ' checked' : '') + ' onchange="toggleBruleurExpo(\'' + sm + '\',this.checked)" style="width:18px;height:18px;cursor:pointer;accent-color:var(--primary);"></td>';

      /* Consentement — only show if exposition is active */
      h += '<td style="text-align:center;">';
      if (bd.exposition) {
        h += renderConsentementIcon(sm, bd.consentement || '');
      } else {
        h += '<span style="color:var(--text-light);">\u2014</span>';
      }
      h += '</td>';

      /* Scanner — only show if exposition is active */
      h += '<td style="text-align:center;">';
      if (bd.exposition) {
        h += renderScannerIcon(sm, bd.scanner);
      } else {
        h += '<span style="color:var(--text-light);">—</span>';
      }
      h += '</td>';

      /* ECBU — only show if exposition is active */
      h += '<td>';
      if (bd.exposition) {
        h += renderEcbuCell(sm, bd.ecbus);
      } else {
        h += '<span style="color:var(--text-light);">—</span>';
      }
      h += '</td>';

      /* Commentaire */
      var commentVal = bruleurComments[a.matricule] || '';
      h += '<td class="no-print"><input type="text" class="sport-input-sm" value="' + esc(commentVal) + '" placeholder="Commentaire…" onchange="saveBruleurComment(\'' + sm + '\',this.value)"></td>';

      h += '</tr>';
      return h;
    }

    /* ─── Scanner icon with dropdown ─── */
    function renderScannerIcon(matricule, scanner) {
      var statut = scanner.statut || '';
      var cls = 'bc-icon';
      if (statut === 'prescrit') cls += ' bc-prescrit';
      else if (statut === 'recu') cls += ' bc-recu';
      else if (statut === 'vu') cls += ' bc-vu';

      var label = statut ? (statut === 'recu' ? 'Reçu' : statut.charAt(0).toUpperCase() + statut.slice(1)) : '—';
      var h = '<span class="bc-status-wrap">';
      h += '<span class="' + cls + '" onclick="toggleBcDropdown(event,\'scan-' + esc(matricule) + '\')" title="Scanner thoracique: ' + label + '">🩻</span>';
      h += '<div class="bc-dropdown" id="scan-' + esc(matricule) + '">';
      h += '<button onclick="event.stopPropagation();setScannerStatus(\'' + esc(matricule) + '\',\'prescrit\')">📝 Prescrit</button>';
      h += '<button onclick="event.stopPropagation();setScannerStatus(\'' + esc(matricule) + '\',\'recu\')">📩 Reçu</button>';
      h += '<button onclick="event.stopPropagation();setScannerStatus(\'' + esc(matricule) + '\',\'vu\')">✅ Vu par le médecin</button>';
      if (statut) h += '<button onclick="event.stopPropagation();setScannerStatus(\'' + esc(matricule) + '\',\'\')" style="color:var(--primary);">✕ Retirer</button>';
      h += '</div>';
      if (statut) h += '<div style="font-size:0.72em;color:var(--text-light);margin-top:2px;">' + label + '</div>';
      h += '</span>';
      return h;
    }

    /* ─── Consentement icon with dropdown ─── */
    function renderConsentementIcon(matricule, statut) {
      var cls = 'bc-icon';
      if (statut === 'envoye') cls += ' bc-prescrit';
      else if (statut === 'recu') cls += ' bc-vu';

      var label = statut === 'envoye' ? 'Envoy\u00e9' : (statut === 'recu' ? 'Re\u00e7u' : '\u2014');
      var h = '<span class="bc-status-wrap">';
      h += '<span class="' + cls + '" onclick="toggleBcDropdown(event,\'cons-' + esc(matricule) + '\')" title="Consentement: ' + label + '">\u270D\uFE0F</span>';
      h += '<div class="bc-dropdown" id="cons-' + esc(matricule) + '">';
      h += '<button onclick="event.stopPropagation();setConsentementStatus(\'' + esc(matricule) + '\',\'envoye\')">📨 Envoy\u00e9</button>';
      h += '<button onclick="event.stopPropagation();setConsentementStatus(\'' + esc(matricule) + '\',\'recu\')">✅ Re\u00e7u</button>';
      if (statut) h += '<button onclick="event.stopPropagation();setConsentementStatus(\'' + esc(matricule) + '\',\'\')" style="color:var(--primary);">✕ Retirer</button>';
      h += '</div>';
      if (statut) h += '<div style="font-size:0.72em;color:var(--text-light);margin-top:2px;">' + label + '</div>';
      h += '</span>';
      return h;
    }

    /* ─── ECBU cell ─── */
    function renderEcbuCell(matricule, ecbus) {
      var now = Date.now();
      var SIX_MONTHS = 6 * 30.44 * 24 * 3600000; // ~6 months in ms
      var h = '';

      /* Show existing ECBU entries */
      if (ecbus.length > 0) {
        for (var i = 0; i < ecbus.length; i++) {
          var e = ecbus[i];
          var statut = e.statut || '';
          var cls = '';
          if (statut === 'prescrit') cls = 'bc-prescrit';
          else if (statut === 'recu') cls = 'bc-recu';
          else if (statut === 'vu') cls = 'bc-vu';

          var label = statut === 'recu' ? 'Reçu' : (statut ? statut.charAt(0).toUpperCase() + statut.slice(1) : '?');
          h += '<div class="bc-ecbu-row">';
          h += '<span class="bc-status-wrap">';
          h += '<span class="bc-icon ' + cls + '" onclick="toggleBcDropdown(event,\'ecbu-' + esc(e.id) + '\')" title="ECBU: ' + label + '">🧪</span>';
          h += '<div class="bc-dropdown" id="ecbu-' + esc(e.id) + '">';
          h += '<button onclick="event.stopPropagation();updateEcbuStatus(\'' + esc(matricule) + '\',\'' + esc(e.id) + '\',\'prescrit\')">📝 Prescrit</button>';
          h += '<button onclick="event.stopPropagation();updateEcbuStatus(\'' + esc(matricule) + '\',\'' + esc(e.id) + '\',\'recu\')">📩 Reçu</button>';
          h += '<button onclick="event.stopPropagation();updateEcbuStatus(\'' + esc(matricule) + '\',\'' + esc(e.id) + '\',\'vu\')">✅ Vu par le médecin</button>';
          h += '<button onclick="event.stopPropagation();editEcbuDate(\'' + esc(matricule) + '\',\'' + esc(e.id) + '\',\'' + esc(e.date || '') + '\')">📅 Modifier la date</button>';
          h += '<button onclick="event.stopPropagation();deleteEcbu(\'' + esc(matricule) + '\',\'' + esc(e.id) + '\')" style="color:var(--primary);">🗑️ Supprimer</button>';
          h += '</div></span>';
          h += ' <span style="font-size:0.85em;">' + esc(e.date || '') + ' — <em>' + label + '</em></span>';
          h += '</div>';
        }

        /* Check last ECBU date for next scheduling (6 mois après la date de l'ECBU) */
        var lastEcbuDate = null;
        for (var j = ecbus.length - 1; j >= 0; j--) {
          if (ecbus[j].date) {
            var parts = ecbus[j].date.match(/(\d{2})\/(\d{2})\/(\d{4})/);
            if (parts) lastEcbuDate = new Date(parseInt(parts[3]), parseInt(parts[2]) - 1, parseInt(parts[1]));
            break;
          }
        }
        if (lastEcbuDate) {
          var nextDate = new Date(lastEcbuDate.getTime() + SIX_MONTHS);
          var isOverdue = nextDate.getTime() < now;
          var dd = ('0' + nextDate.getDate()).slice(-2);
          var mm = ('0' + (nextDate.getMonth() + 1)).slice(-2);
          var nextStr = dd + '/' + mm + '/' + nextDate.getFullYear();
          h += '<div class="bc-next-date' + (isOverdue ? ' bc-next-overdue' : '') + '">⏰ Prochain ECBU : ' + nextStr + (isOverdue ? ' ⚠️ EN RETARD' : '') + '</div>';
        }
      }

      /* Add ECBU button */
      h += '<button onclick="addNewEcbu(\'' + esc(matricule) + '\')" class="btn btn-outline" style="padding:4px 10px;font-size:0.78em;margin-top:4px;">➕ Ajouter ECBU</button>';
      return h;
    }

    /* ─── Dropdown toggle ─── */
    function toggleBcDropdown(event, id) {
      event.stopPropagation();
      var all = document.querySelectorAll('.bc-dropdown');
      var target = document.getElementById(id);
      var wasOpen = target && target.style.display === 'block';
      all.forEach(function (d) { d.style.display = 'none'; });
      if (target && !wasOpen) target.style.display = 'block';
    }

    /* Close dropdowns on document click */
    document.addEventListener('click', function () {
      var all = document.querySelectorAll('.bc-dropdown');
      all.forEach(function (d) { d.style.display = 'none'; });
    });

    /* ─── Actions ─── */
    function toggleBruleurExpo(matricule, checked) {
      bruleurDataByMatricule[matricule] = bruleurDataByMatricule[matricule] || { exposition: false, scanner: { statut: '', date: '' }, consentement: '', ecbus: [] };
      bruleurDataByMatricule[matricule].exposition = checked;
      google.script.run.withFailureHandler(function (e) { alert('Erreur: ' + e.message); }).saveBruleurExposition(matricule, checked);
      renderBruleurPage();
    }

    function setScannerStatus(matricule, statut) {
      bruleurDataByMatricule[matricule] = bruleurDataByMatricule[matricule] || { exposition: false, scanner: { statut: '', date: '' }, consentement: '', ecbus: [] };
      bruleurDataByMatricule[matricule].scanner.statut = statut;
      google.script.run.withFailureHandler(function (e) { alert('Erreur: ' + e.message); }).saveScannerStatus(matricule, statut);
      renderBruleurPage();
    }

    function setConsentementStatus(matricule, statut) {
      bruleurDataByMatricule[matricule] = bruleurDataByMatricule[matricule] || { exposition: false, scanner: { statut: '', date: '' }, consentement: '', ecbus: [] };
      bruleurDataByMatricule[matricule].consentement = statut;
      google.script.run.withFailureHandler(function (e) { alert('Erreur: ' + e.message); }).saveConsentementStatus(matricule, statut);
      renderBruleurPage();
    }

    function addNewEcbu(matricule) {
      var dateStr = prompt('Date de l\'ECBU (JJ/MM/AAAA) :', formatDateFrFromObj(new Date()));
      if (!dateStr) return;
      bruleurDataByMatricule[matricule] = bruleurDataByMatricule[matricule] || { exposition: false, scanner: { statut: '', date: '' }, consentement: '', ecbus: [] };
      google.script.run
        .withSuccessHandler(function (ecbus) {
          bruleurDataByMatricule[matricule].ecbus = ecbus;
          renderBruleurPage();
        })
        .withFailureHandler(function (e) { alert('Erreur: ' + e.message); })
        .saveEcbuEntry(matricule, { date: dateStr, statut: 'prescrit' });
    }

    function updateEcbuStatus(matricule, ecbuId, statut) {
      google.script.run
        .withSuccessHandler(function (ecbus) {
          bruleurDataByMatricule[matricule] = bruleurDataByMatricule[matricule] || { exposition: false, scanner: { statut: '', date: '' }, consentement: '', ecbus: [] };
          bruleurDataByMatricule[matricule].ecbus = ecbus;
          renderBruleurPage();
        })
        .withFailureHandler(function (e) { alert('Erreur: ' + e.message); })
        .saveEcbuEntry(matricule, { id: ecbuId, statut: statut });
    }

    function deleteEcbu(matricule, ecbuId) {
      if (!confirm('Supprimer cet ECBU ?')) return;
      google.script.run
        .withSuccessHandler(function (ecbus) {
          bruleurDataByMatricule[matricule] = bruleurDataByMatricule[matricule] || { exposition: false, scanner: { statut: '', date: '' }, consentement: '', ecbus: [] };
          bruleurDataByMatricule[matricule].ecbus = ecbus;
          renderBruleurPage();
        })
        .withFailureHandler(function (e) { alert('Erreur: ' + e.message); })
        .deleteEcbuEntry(matricule, ecbuId);
    }

    function editEcbuDate(matricule, ecbuId, currentDate) {
      var newDate = prompt('Nouvelle date de l\'ECBU (JJ/MM/AAAA) :', currentDate || '');
      if (!newDate || newDate === currentDate) return;
      google.script.run
        .withSuccessHandler(function (ecbus) {
          bruleurDataByMatricule[matricule] = bruleurDataByMatricule[matricule] || { exposition: false, scanner: { statut: '', date: '' }, consentement: '', ecbus: [] };
          bruleurDataByMatricule[matricule].ecbus = ecbus;
          renderBruleurPage();
        })
        .withFailureHandler(function (e) { alert('Erreur: ' + e.message); })
        .saveEcbuEntry(matricule, { id: ecbuId, date: newDate });
    }

    function filterBruleurTable() {
      var q = (document.getElementById('bruleurSearch') || {}).value || '';
      q = q.toLowerCase().trim();
      var rows = document.querySelectorAll('#bruleurTable tbody tr');
      rows.forEach(function (row) {
        var s = (row.getAttribute('data-search') || '');
        row.style.display = (!q || s.indexOf(q) !== -1) ? '' : 'none';
      });
    }

    function toggleBruleurExpoFilter() {
      bruleurExpoFilter = !bruleurExpoFilter;
      renderBruleurPage();
    }

    /* Also handle ECBU overdue icon on main page badges */
    function getBruleurOverdueCount() {
      var count = 0;
      var now = Date.now();
      var SIX_MONTHS = 6 * 30.44 * 24 * 3600000;
      var agents = getBruleurAgents();
      agents.forEach(function (a) {
        var bd = bruleurDataByMatricule[a.matricule];
        if (!bd || !bd.exposition) return;
        var ecbus = bd.ecbus || [];
        var lastEcbuDate = null;
        for (var j = ecbus.length - 1; j >= 0; j--) {
          if (ecbus[j].date) {
            var parts = ecbus[j].date.match(/(\d{2})\/(\d{2})\/(\d{4})/);
            if (parts) lastEcbuDate = new Date(parseInt(parts[3]), parseInt(parts[2]) - 1, parseInt(parts[1]));
            break;
          }
        }
        if (lastEcbuDate) {
          var nextDate = new Date(lastEcbuDate.getTime() + SIX_MONTHS);
          if (nextDate.getTime() < now) count++;
        }
      });
      return count;
    }

  </script>
</body>
